<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Der Einzige Wahre Plan</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-512.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #18181f;
    --border: #2a2a35;
    --accent: #e63946;
    --accent2: #ff6b35;
    --gold: #f4c430;
    --text: #f0f0f5;
    --muted: #7a7a90;
    --green: #2ec27e;
    --blue: #4a9eff;
    --teal: #14b8a6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .app-header {
    background: linear-gradient(135deg, #0a0a0f 0%, #1a0a10 100%);
    padding: 20px 16px 16px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .app-title { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; color: var(--accent); }
  .phase-badge {
    background: var(--accent);
    color: white;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ── PHASE TABS ── */
  .phase-tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .phase-tabs::-webkit-scrollbar { display: none; }
  .phase-tab {
    flex-shrink: 0;
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
    white-space: nowrap;
  }
  .phase-tab.active { color: white; border-color: transparent; }
  .phase-tab[data-phase="volume"].active { background: var(--blue); }
  .phase-tab[data-phase="intensity"].active { background: var(--accent2); }
  .phase-tab[data-phase="strength"].active { background: var(--accent); }
  .phase-tab[data-phase="deload"].active { background: var(--teal); }
  .phase-tab[data-phase="deload2"].active { background: #8b5cf6; }

  /* ── DAY TABS ── */
  .day-nav {
    display: flex;
    gap: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .day-nav::-webkit-scrollbar { display: none; }
  .day-btn {
    flex: 1;
    min-width: 80px;
    padding: 12px 8px;
    text-align: center;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .day-btn.active { color: var(--text); border-bottom-color: var(--accent); }
  .day-btn .day-label { font-size: 13px; font-weight: 700; display: block; }

  /* ── WEEK SELECTOR ── */
  .week-bar {
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .week-bar::-webkit-scrollbar { display: none; }
  .week-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0; }
  .week-btn {
    flex-shrink: 0;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .week-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

  /* ── CONTENT ── */
  .content { padding: 12px 12px 80px; }

  .session-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    color: var(--gold);
    margin-bottom: 12px;
    padding: 0 4px;
  }

  /* ── EXERCISE CARD ── */
  .ex-card {
    background: var(--card);
    border-radius: 14px;
    margin-bottom: 10px;
    border: 1px solid var(--border);
    overflow: hidden;
    transition: all 0.2s;
  }
  .ex-card.done { border-color: var(--green); opacity: 0.7; }
  .ex-card.done .ex-name { text-decoration: line-through; color: var(--muted); }

  .ex-header {
    padding: 13px 14px 10px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    cursor: pointer;
  }

  .ex-check {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
    transition: all 0.2s;
  }
  .ex-card.done .ex-check { background: var(--green); border-color: var(--green); }
  .ex-check svg { display: none; }
  .ex-card.done .ex-check svg { display: block; }

  .ex-info { flex: 1; min-width: 0; }
  .ex-name { font-size: 14px; font-weight: 600; line-height: 1.3; margin-bottom: 6px; }

  .ex-pills { display: flex; flex-wrap: wrap; gap: 5px; }
  .pill {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 6px;
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .pill.weight { background: rgba(230,57,70,0.15); color: var(--accent); border-color: rgba(230,57,70,0.3); }
  .pill.reps   { background: rgba(74,158,255,0.12); color: var(--blue); border-color: rgba(74,158,255,0.25); }
  .pill.sets   { background: rgba(244,196,48,0.12); color: var(--gold); border-color: rgba(244,196,48,0.25); }
  .pill.rest   { background: rgba(126,126,150,0.15); color: var(--muted); }
  .pill.pct    { background: rgba(46,194,126,0.12); color: var(--green); border-color: rgba(46,194,126,0.25); }

  /* ── NOTES ── */
  .ex-note {
    margin: 0 14px 12px;
    padding: 8px 10px;
    background: var(--surface);
    border-radius: 8px;
    font-size: 12px;
    color: var(--muted);
    border-left: 2px solid var(--gold);
    line-height: 1.5;
  }

  /* ── LOG FIELD ── */
  .ex-log {
    padding: 0 14px 12px;
    display: none;
  }
  .ex-card.expanded .ex-log { display: block; }
  .log-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .log-set-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    width: 40px;
    flex-shrink: 0;
    text-transform: uppercase;
  }
  .log-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 7px 10px;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }
  .log-input:focus { border-color: var(--accent); }
  .log-input::placeholder { color: var(--muted); font-weight: 400; }

  .expand-btn {
    padding: 0 14px 10px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .expand-btn svg { transition: transform 0.2s; }
  .ex-card.expanded .expand-btn svg { transform: rotate(180deg); }

  /* ── EMPTY ── */
  .empty-msg {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 14px;
  }

  /* ── BOTTOM BAR ── */
  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 100;
  }
  .progress-wrap { flex: 1; margin-right: 12px; }
  .progress-text { font-size: 11px; color: var(--muted); margin-bottom: 5px; }
  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.4s; }
  .finish-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
  }
  .finish-btn:active { opacity: 0.8; }
</style>
</head>

// ─────────────────────────────────────────────
// STATE + STORAGE
// ─────────────────────────────────────────────
const STORAGE_KEY = 'trainingsplanAppState_v1';

function defaultState() {
  return {
    currentPhase: 'volume',
    currentDay: null,
    currentWeek: 1,
    doneByContext: {},
    logsByContext: {}
  };
}

function loadAppState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    return { ...defaultState(), ...JSON.parse(raw) };
  } catch (err) {
    console.warn('Konnte gespeicherten Stand nicht laden:', err);
    return defaultState();
  }
}

let appState = loadAppState();
let currentPhase = appState.currentPhase || 'volume';
let currentDay   = appState.currentDay;
let currentWeek  = appState.currentWeek || 1;
let doneSet      = new Set();
let expandedSet  = new Set();

function getDays() { return Object.keys(PLAN[currentPhase].days); }
function getMaxWeeks() { return PLAN[currentPhase].weeks; }
function getExercises() {
  if (!currentDay) return [];
  return PLAN[currentPhase].days[currentDay].exercises;
}
function getSession() {
  if (!currentDay) return '';
  return PLAN[currentPhase].days[currentDay].session;
}
function getContextKey() {
  return `${currentPhase}__${currentDay}__week${currentWeek}`;
}
function syncDoneSetFromStorage() {
  const list = appState.doneByContext[getContextKey()] || [];
  doneSet = new Set(list);
}
function getLogsForContext() {
  const key = getContextKey();
  if (!appState.logsByContext[key]) appState.logsByContext[key] = {};
  return appState.logsByContext[key];
}
function saveAppState() {
  appState.currentPhase = currentPhase;
  appState.currentDay = currentDay;
  appState.currentWeek = currentWeek;
  appState.doneByContext[getContextKey()] = Array.from(doneSet).sort((a,b) => a - b);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(appState));
}
function normaliseCurrentSelection() {
  const days = getDays();
  if (!days.includes(currentDay)) currentDay = days[0];
  const maxWeeks = getMaxWeeks();
  if (currentWeek < 1 || currentWeek > maxWeeks) currentWeek = 1;
}
function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function setPhase(p) {
  currentPhase = p;
  currentDay = getDays()[0];
  currentWeek = 1;
  expandedSet.clear();
  syncDoneSetFromStorage();
  saveAppState();
  document.querySelectorAll('.phase-tab').forEach(t => t.classList.toggle('active', t.dataset.phase === p));
  document.getElementById('phaseBadge').textContent = p.charAt(0).toUpperCase() + p.slice(1);
  renderDayNav(); renderWeekBar(); renderContent();
}

function setDay(d) {
  currentDay = d;
  expandedSet.clear();
  syncDoneSetFromStorage();
  saveAppState();
  document.querySelectorAll('.day-btn').forEach(b => b.classList.toggle('active', b.dataset.day === d));
  renderContent();
}

function setWeek(w) {
  currentWeek = w;
  expandedSet.clear();
  syncDoneSetFromStorage();
  saveAppState();
  document.querySelectorAll('.week-btn').forEach(b => b.classList.toggle('active', +b.dataset.w === w));
  renderContent();
}

function renderDayNav() {
  const days = getDays();
  const nav = document.getElementById('dayNav');
  if (!currentDay || !days.includes(currentDay)) currentDay = days[0];
  nav.innerHTML = days.map(d => `
    <button class="day-btn ${d === currentDay ? 'active' : ''}" data-day="${d}" onclick="setDay('${d}')">
      <span class="day-label">${d.split(' ')[0]}</span>
      <span style="font-size:10px;color:var(--muted)">${d.includes('(') ? d.match(/\(.*\)/)?.[0] : ''}</span>
    </button>`).join('');
}

function renderWeekBar() {
  const max = getMaxWeeks();
  if (currentWeek > max) currentWeek = 1;
  const bar = document.getElementById('weekBar');
  bar.innerHTML = `<span class="week-label">Woche</span>` +
    Array.from({length: max}, (_,i) => `
      <button class="week-btn ${currentWeek === i+1 ? 'active' : ''}" data-w="${i+1}" onclick="setWeek(${i+1})">${i+1}</button>
    `).join('');
}

function renderContent() {
  const exs = getExercises();
  const wi  = currentWeek - 1;
  const content = document.getElementById('content');
  const logs = getLogsForContext();

  if (!exs.length) { content.innerHTML = '<div class="empty-msg">Kein Training für diesen Tag</div>'; updateProgress(); return; }

  content.innerHTML = `<div class="session-title">${getSession()}</div>` +
    exs.map((ex, idx) => {
      const wData = ex.weeks[wi] || ex.weeks[0];
      const isDone = doneSet.has(idx);
      const isExp  = expandedSet.has(idx);
      const sets = wData.s;
      const sCount = typeof sets === 'string' && sets.includes('+DS') ? parseInt(sets) : (typeof sets === 'number' ? sets : parseInt(sets));
      const savedRows = logs[idx] || [];
      const logRows = Array.from({length: isNaN(sCount) ? 3 : sCount}, (_, si) => {
        const saved = savedRows[si] || {};
        const weightValue = saved.weight ?? '';
        const repsValue = saved.reps ?? '';
        return `<div class="log-row">
          <span class="log-set-label">Satz ${si+1}</span>
          <input class="log-input" type="number" inputmode="decimal" step="0.5" placeholder="${wData.w} kg" value="${escapeHtml(weightValue)}" oninput="saveLog(${idx}, ${si}, 'weight', this.value)">
          <input class="log-input" type="number" inputmode="numeric" placeholder="${wData.r}" style="max-width:60px" value="${escapeHtml(repsValue)}" oninput="saveLog(${idx}, ${si}, 'reps', this.value)">
        </div>`;
      }).join('');

      return `<div class="ex-card ${isDone ? 'done' : ''} ${isExp ? 'expanded' : ''}" id="ex-${idx}">
        <div class="ex-header" onclick="toggleExpand(${idx})">
          <div class="ex-check" onclick="toggleDone(event,${idx})">
            <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
              <path d="M1 5L4.5 8.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="ex-info">
            <div class="ex-name">${ex.name}</div>
            <div class="ex-pills">
              <span class="pill weight">⚖ ${wData.w} kg</span>
              <span class="pill reps">✕ ${wData.r}</span>
              <span class="pill sets">× ${wData.s} Sätze</span>
              <span class="pill rest">⏱ ${wData.rest}</span>
              <span class="pill pct">${wData.pct}</span>
            </div>
          </div>
        </div>
        ${wData.note ? `<div class="ex-note">💡 ${wData.note}</div>` : ''}
        <div class="expand-btn" onclick="toggleExpand(${idx})">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 9l6 6 6-6"/>
          </svg>
          Gewicht & Wdhl. loggen
        </div>
        <div class="ex-log">${logRows}</div>
      </div>`;
    }).join('');

  updateProgress();
}

function toggleExpand(idx) {
  if (expandedSet.has(idx)) expandedSet.delete(idx);
  else expandedSet.add(idx);
  const card = document.getElementById(`ex-${idx}`);
  if (card) card.classList.toggle('expanded', expandedSet.has(idx));
}

function toggleDone(e, idx) {
  e.stopPropagation();
  if (doneSet.has(idx)) doneSet.delete(idx);
  else doneSet.add(idx);
  const card = document.getElementById(`ex-${idx}`);
  if (card) {
    card.classList.toggle('done', doneSet.has(idx));
    if (doneSet.has(idx)) expandedSet.delete(idx);
    card.classList.toggle('expanded', expandedSet.has(idx));
  }
  saveAppState();
  updateProgress();
}

function saveLog(exerciseIdx, setIdx, field, value) {
  const logs = getLogsForContext();
  if (!logs[exerciseIdx]) logs[exerciseIdx] = [];
  if (!logs[exerciseIdx][setIdx]) logs[exerciseIdx][setIdx] = { weight: '', reps: '' };
  logs[exerciseIdx][setIdx][field] = value;
  saveAppState();
}

function updateProgress() {
  const total = getExercises().length;
  const done  = doneSet.size;
  const pct   = total ? (done / total * 100) : 0;
  document.getElementById('progressText').textContent = `${done} / ${total} Übungen`;
  document.getElementById('progressFill').style.width = pct + '%';
}

function finishWorkout() {
  const exs = getExercises();
  const remaining = exs.length - doneSet.size;
  if (remaining > 0) {
    if (!confirm(`Noch ${remaining} Übungen offen. Trotzdem abschliessen?`)) return;
  }
  exs.forEach((_, i) => doneSet.add(i));
  document.querySelectorAll('.ex-card').forEach(c => c.classList.add('done'));
  saveAppState();
  updateProgress();
  setTimeout(() => alert('💪 Workout abgeschlossen! Gut gemacht!'), 100);
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
normaliseCurrentSelection();
syncDoneSetFromStorage();
saveAppState();
document.getElementById('phaseBadge').textContent = currentPhase.charAt(0).toUpperCase() + currentPhase.slice(1);
document.querySelectorAll('.phase-tab').forEach(t => t.classList.toggle('active', t.dataset.phase === currentPhase));
renderDayNav();
renderWeekBar();
renderContent();
</script>
